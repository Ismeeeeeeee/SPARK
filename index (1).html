<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK - Scientific Profile & Learning Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js for React-like Reactive State Management -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 9999px;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }
        .glow-effect {
            animation: pulse-glow 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen font-sans text-slate-100 flex justify-center overflow-x-hidden antialiased selection:bg-cyan-500/30">

    <!-- Main Container Mimicking React Layout -->
    <div 
        x-data="{
            isRegistered: false,
            onboardingPage: 'welcome',
            regName: '',
            selectedAvatar: null,
            selectedSpecialty: null,
            activeTab: 'home',
            user: {
                name: '',
                avatar: '',
                specialty: '',
                level: 1,
                xp: 0,
                xpToNext: 1000
            },
            specialties: [
                { id: 'chem', title: 'Chemistry', icon: 'beaker', color: 'text-blue-400', border: 'border-blue-500/30', bg: 'bg-blue-500/10', desc: 'Masters of matter, elements, and solutions.' },
                { id: 'bio', title: 'Biology', icon: 'leaf', color: 'text-green-400', border: 'border-green-500/30', bg: 'bg-green-500/10', desc: 'Explorers of cells, ecosystems, and biodiversity.' },
                { id: 'phys', title: 'Physics', icon: 'zap', color: 'text-purple-400', border: 'border-purple-500/30', bg: 'bg-purple-500/10', desc: 'Pioneers of energy, forces, and kinetic motion.' },
                { id: 'earth', title: 'Earth Science', icon: 'globe', color: 'text-orange-400', border: 'border-orange-500/30', bg: 'bg-orange-500/10', desc: 'Guardians of earth layers, weather, and resources.' }
            ],
            avatars: ['A', 'B', 'C', 'D', 'E', 'F'],
            completeRegistration() {
                this.user = {
                    name: this.regName,
                    avatar: this.selectedAvatar,
                    specialty: this.selectedSpecialty.title,
                    level: 1,
                    xp: 0,
                    xpToNext: 1000
                };
                this.isRegistered = true;
            }
        }"
        class="w-full max-w-md bg-slate-900 h-[100dvh] flex flex-col relative overflow-hidden shadow-2xl sm:border-x sm:border-slate-800"
    >

        <!-- ========================================== -->
        <!-- ONBOARDING FLOW                            -->
        <!-- ========================================== -->
        <template x-if="!isRegistered">
            <div class="flex-1 flex flex-col p-8 justify-center transition-all duration-500 ease-out">
                
                <!-- Welcome Screen -->
                <div x-show="onboardingPage === 'welcome'" x-transition class="text-center space-y-6">
                    <div class="w-20 h-20 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/20 relative group overflow-hidden">
                        <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <!-- Zap Icon (Lucide equivalent) -->
                        <svg class="text-white w-10 h-10 glow-effect" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                        </svg>
                    </div>
                    <div class="space-y-2">
                        <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">SPARK</h1>
                        <p class="text-slate-400 text-sm">Let's set up your scientific profile to begin your journey.</p>
                    </div>
                    <button 
                        @click="onboardingPage = 'name'" 
                        class="w-full py-4 bg-blue-600 rounded-xl font-bold hover:bg-blue-500 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 flex justify-center gap-2 items-center text-white shadow-lg shadow-blue-600/20"
                    >
                        Start 
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>

                <!-- Name Entry Screen -->
                <div x-show="onboardingPage === 'name'" x-transition class="space-y-6">
                    <h2 class="text-2xl font-bold tracking-tight text-slate-100">What should we call you, bright scientist?</h2>
                    <div class="relative">
                        <input 
                            autofocus
                            type="text" 
                            x-model="regName"
                            placeholder="Your scientific moniker..."
                            class="w-full bg-slate-800/80 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all duration-200"
                        />
                    </div>
                    <button 
                        :disabled="!regName.trim()" 
                        @click="onboardingPage = 'avatar'" 
                        class="w-full py-4 bg-blue-600 disabled:opacity-50 disabled:pointer-events-none hover:bg-blue-500 rounded-xl font-bold transition-all duration-200 shadow-md"
                    >
                        Next
                    </button>
                </div>

                <!-- Avatar Selection Screen -->
                <div x-show="onboardingPage === 'avatar'" x-transition class="space-y-6">
                    <h2 class="text-2xl font-bold tracking-tight text-slate-100">Choose your appearance</h2>
                    <div class="grid grid-cols-3 gap-4">
                        <template x-for="a in avatars">
                            <button 
                                @click="selectedAvatar = a"
                                :class="selectedAvatar === a ? 'border-cyan-500 bg-cyan-900/20 text-cyan-400 ring-2 ring-cyan-500/20' : 'border-slate-700 bg-slate-800/60 hover:border-slate-600 text-slate-300'"
                                class="aspect-square rounded-2xl border-2 flex items-center justify-center text-3xl font-black transition-all duration-200"
                                x-text="a"
                            ></button>
                        </template>
                    </div>
                    <button 
                        :disabled="!selectedAvatar" 
                        @click="onboardingPage = 'course'" 
                        class="w-full py-4 bg-blue-600 disabled:opacity-50 disabled:pointer-events-none hover:bg-blue-500 rounded-xl font-bold transition-all duration-200"
                    >
                        Next
                    </button>
                </div>

                <!-- Specialty Selection Screen -->
                <div x-show="onboardingPage === 'course'" x-transition class="space-y-4">
                    <h2 class="text-2xl font-bold tracking-tight text-slate-100 mb-4">Pick your science branch</h2>
                    
                    <div class="space-y-3">
                        <template x-for="spec in specialties">
                            <button 
                                @click="selectedSpecialty = spec"
                                :class="selectedSpecialty?.id === spec.id ? 'border-cyan-500 bg-cyan-950/40 ring-1 ring-cyan-500/30' : 'border-slate-800 bg-slate-800/40 hover:bg-slate-800/70'"
                                class="w-full p-4 rounded-xl border flex items-center gap-4 text-left transition-all duration-200"
                            >
                                <div class="p-2 rounded-lg bg-slate-900/50">
                                    <!-- Dynamic Specialty Icons -->
                                    <template x-if="spec.icon === 'beaker'">
                                        <svg class="w-6 h-6" :class="spec.color" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                            <path d="M4.5 3h15M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3M6 14h12"></path>
                                        </svg>
                                    </template>
                                    <template x-if="spec.icon === 'leaf'">
                                        <svg class="w-6 h-6" :class="spec.color" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 0 8.5C17 15 14.98 17.5 11 20z"></path>
                                            <path d="M19 2L11 20"></path>
                                        </svg>
                                    </template>
                                    <template x-if="spec.icon === 'zap'">
                                        <svg class="w-6 h-6" :class="spec.color" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                                        </svg>
                                    </template>
                                    <template x-if="spec.icon === 'globe'">
                                        <svg class="w-6 h-6" :class="spec.color" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                            <circle cx="12" cy="12" r="10"></circle>
                                            <line x1="2" y1="12" x2="22" y2="12"></line>
                                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                                        </svg>
                                    </template>
                                </div>
                                <div class="flex-1">
                                    <div class="font-bold text-slate-200" x-text="spec.title"></div>
                                    <div class="text-xs text-slate-400" x-text="spec.desc"></div>
                                </div>
                            </button>
                        </template>
                    </div>

                    <button 
                        :disabled="!selectedSpecialty" 
                        @click="completeRegistration()" 
                        class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 disabled:opacity-50 disabled:pointer-events-none hover:from-cyan-500 hover:to-blue-500 rounded-xl font-bold transition-all duration-200 mt-4 shadow-lg shadow-cyan-600/15"
                    >
                        Complete Setup
                    </button>
                </div>

            </div>
        </template>

        <!-- ========================================== -->
        <!-- MAIN DASHBOARD SYSTEM                      -->
        <!-- ========================================== -->
        <template x-if="isRegistered">
            <div class="flex-1 flex flex-col h-full">
                
                <!-- Persistent Header -->
                <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg bg-cyan-500/10 flex items-center justify-center border border-cyan-500/20">
                            <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                            </svg>
                        </div>
                        <h1 class="font-black text-xl tracking-wider text-cyan-400">SPARK</h1>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-semibold bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700/50 flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-emerald-400 glow-effect"></span>
                            <span class="text-slate-300" x-text="user.name"></span>
                        </span>
                        <div class="w-8 h-8 rounded-full bg-cyan-600 flex items-center justify-center font-bold text-sm text-white" x-text="user.avatar"></div>
                    </div>
                </header>

                <!-- Dashboard Content Area -->
                <main class="flex-1 overflow-y-auto p-6 space-y-6">
                    
                    <!-- Tab: Home -->
                    <div x-show="activeTab === 'home'" x-transition class="space-y-6">
                        
                        <!-- Premium User Welcome Card -->
                        <div class="relative bg-gradient-to-br from-blue-900/60 via-slate-900 to-slate-900 p-6 rounded-2xl border border-blue-500/20 overflow-hidden shadow-xl">
                            <!-- Background Accent Elements -->
                            <div class="absolute -right-8 -top-8 w-32 h-32 bg-cyan-500/10 rounded-full blur-2xl"></div>
                            
                            <p class="text-blue-400/80 text-xs font-semibold tracking-wider uppercase">Welcome back, Scientist</p>
                            <h2 class="text-2xl font-black mt-1 text-white tracking-tight" x-text="user.name"></h2>
                            
                            <div class="mt-4 flex items-center gap-2">
                                <span class="text-xs px-2.5 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded-md font-bold text-cyan-400 uppercase tracking-widest" x-text="user.specialty"></span>
                                <span class="text-xs text-slate-400">Division Rank #4</span>
                            </div>

                            <!-- Progress Track -->
                            <div class="mt-6 space-y-2">
                                <div class="flex justify-between text-xs font-bold text-slate-400">
                                    <span>XP PROGRESS</span>
                                    <span class="text-cyan-400" x-text="`${user.xp} / ${user.xpToNext} XP`"></span>
                                </div>
                                <div class="w-full h-2 bg-slate-950 rounded-full overflow-hidden">
                                    <div class="h-full bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full transition-all duration-500" :style="`width: ${(user.xp / user.xpToNext) * 100}%`"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Stats Grid -->
                        <div class="grid grid-cols-2 gap-4">
                            <!-- Level Stat Card -->
                            <div class="bg-slate-800/40 border border-slate-800 p-4 rounded-xl text-center group hover:border-slate-700 transition-all">
                                <div class="w-10 h-10 bg-yellow-500/10 rounded-lg flex items-center justify-center mx-auto mb-3">
                                    <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                                        <path d="M4 22h16"></path>
                                        <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"></path>
                                        <path d="M12 2a4 4 0 0 1 4 4v7a4 4 0 0 1-4 4 4 4 0 0 1-4-4V6a4 4 0 0 1 4-4z"></path>
                                    </svg>
                                </div>
                                <div class="text-2xl font-black text-white" x-text="user.level"></div>
                                <div class="text-[10px] text-slate-500 tracking-wider font-extrabold uppercase mt-1">Current Level</div>
                            </div>

                            <!-- XP Stat Card -->
                            <div class="bg-slate-800/40 border border-slate-800 p-4 rounded-xl text-center group hover:border-slate-700 transition-all">
                                <div class="w-10 h-10 bg-green-500/10 rounded-lg flex items-center justify-center mx-auto mb-3">
                                    <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                                    </svg>
                                </div>
                                <div class="text-2xl font-black text-white" x-text="user.xp"></div>
                                <div class="text-[10px] text-slate-500 tracking-wider font-extrabold uppercase mt-1">Total XP</div>
                            </div>
                        </div>

                        <!-- Mini Daily Mission -->
                        <div class="bg-slate-800/30 border border-slate-800/80 rounded-xl p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="p-2 bg-indigo-500/10 rounded-lg text-indigo-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <polyline points="12 6 12 12 16 14"></polyline>
                                    </svg>
                                </div>
                                <div>
                                    <div class="text-xs text-indigo-400 font-bold uppercase tracking-wider">Daily Spark</div>
                                    <div class="text-sm font-semibold text-slate-200">Solve today's Quick Quiz</div>
                                </div>
                            </div>
                            <button 
                                @click="user.xp = Math.min(user.xp + 250, user.xpToNext); if (user.xp >= user.xpToNext) { user.level++; user.xp = 0; }" 
                                class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 active:scale-95 transition-all text-xs font-bold rounded-lg text-white"
                            >
                                +250 XP
                            </button>
                        </div>
                    </div>

                    <!-- Tab: Learn -->
                    <div x-show="activeTab === 'learn'" x-transition class="space-y-6">
                        <div class="space-y-2">
                            <h3 class="text-lg font-bold text-white tracking-tight">Active Curriculums</h3>
                            <p class="text-xs text-slate-400">Embark on specific educational milestones to level up your laboratory rank.</p>
                        </div>

                        <div class="space-y-3">
                            <!-- Course Item 1 -->
                            <div class="bg-slate-800/40 border border-slate-800 p-4 rounded-xl flex items-center justify-between hover:border-slate-700 transition-all">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-cyan-500/10 text-cyan-400 flex items-center justify-center rounded-lg">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                            <path d="M4.5 3h15M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3M6 14h12"></path>
                                        </svg>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-sm text-slate-200">Elements & Periodic Trends</h4>
                                        <p class="text-[11px] text-slate-400">5 Modules • Chemistry Branch</p>
                                    </div>
                                </div>
                                <button class="p-1.5 hover:bg-slate-700/50 rounded-lg text-slate-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </button>
                            </div>

                            <!-- Course Item 2 -->
                            <div class="bg-slate-800/40 border border-slate-800 p-4 rounded-xl flex items-center justify-between hover:border-slate-700 transition-all">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-emerald-500/10 text-emerald-400 flex items-center justify-center rounded-lg">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 0 8.5C17 15 14.98 17.5 11 20z"></path>
                                        </svg>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-sm text-slate-200">Cellular Respiration & Mitosis</h4>
                                        <p class="text-[11px] text-slate-400">8 Modules • Biology Branch</p>
                                    </div>
                                </div>
                                <button class="p-1.5 hover:bg-slate-700/50 rounded-lg text-slate-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </button>
                            </div>

                            <!-- Course Item 3 -->
                            <div class="bg-slate-800/40 border border-slate-800 p-4 rounded-xl flex items-center justify-between hover:border-slate-700 transition-all">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-purple-500/10 text-purple-400 flex items-center justify-center rounded-lg">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                                        </svg>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-sm text-slate-200">Kinematics & Force Dynamics</h4>
                                        <p class="text-[11px] text-slate-400">6 Modules • Physics Branch</p>
                                    </div>
                                </div>
                                <button class="p-1.5 hover:bg-slate-700/50 rounded-lg text-slate-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Tab: Profile -->
                    <div x-show="activeTab === 'profile'" x-transition class="space-y-6">
                        <!-- User Card -->
                        <div class="text-center p-6 bg-slate-800/30 border border-slate-850 rounded-2xl">
                            <div class="w-20 h-20 bg-gradient-to-tr from-cyan-500 to-blue-500 text-white text-3xl font-black rounded-full flex items-center justify-center mx-auto shadow-xl" x-text="user.avatar"></div>
                            <h3 class="text-xl font-bold mt-4" x-text="user.name"></h3>
                            <p class="text-xs text-cyan-400 font-semibold tracking-wider uppercase mt-1" x-text="`${user.specialty} Branch`"></p>
                            
                            <!-- Badges Section -->
                            <div class="mt-6 flex justify-center gap-2">
                                <span class="bg-amber-500/10 text-amber-500 border border-amber-500/20 text-[10px] font-black uppercase px-2 py-1 rounded">Novice</span>
                                <span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-[10px] font-black uppercase px-2 py-1 rounded">Trailblazer</span>
                                <span class="bg-purple-500/10 text-purple-400 border border-purple-500/20 text-[10px] font-black uppercase px-2 py-1 rounded">Inquisitive</span>
                            </div>
                        </div>

                        <!-- Mini Settings Link -->
                        <button @click="isRegistered = false; onboardingPage = 'welcome'; regName = ''; selectedAvatar = null; selectedSpecialty = null;" class="w-full py-3 bg-rose-900/20 border border-rose-900/40 text-rose-400 hover:bg-rose-900/30 active:scale-95 transition-all rounded-xl text-sm font-bold">
                            Reset Profile Data
                        </button>
                    </div>

                </main>

                <!-- Persistent Bottom Navigation -->
                <nav class="p-4 border-t border-slate-800/80 bg-slate-900 flex justify-around items-center">
                    <!-- Nav Item: Home -->
                    <button 
                        @click="activeTab = 'home'" 
                        :class="activeTab === 'home' ? 'text-cyan-400' : 'text-slate-500 hover:text-slate-400'"
                        class="p-2.5 transition-all duration-200"
                    >
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </button>
                    
                    <!-- Nav Item: Learn -->
                    <button 
                        @click="activeTab = 'learn'" 
                        :class="activeTab === 'learn' ? 'text-cyan-400' : 'text-slate-500 hover:text-slate-400'"
                        class="p-2.5 transition-all duration-200"
                    >
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                    </button>

                    <!-- Nav Item: Profile -->
                    <button 
                        @click="activeTab = 'profile'" 
                        :class="activeTab === 'profile' ? 'text-cyan-400' : 'text-slate-500 hover:text-slate-400'"
                        class="p-2.5 transition-all duration-200"
                    >
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </button>
                </nav>

            </div>
        </template>

    </div>

</body>
</html>

```
